name: defensa_express
description: "Motor legal local offline-first para defensa de derechos en intervenciones policiales."
publish_to: "none"

version: 0.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Búsqueda y Datos (intl para formato de fechas)
  intl: ^0.20.2
  
  # Grabación de Audio (Phase 4)
  record: ^7.0.0
  audio_session: ^0.2.3
  
  # Grabación de Video (Phase 4)
  camera: ^0.12.0+1
  
  # Permisos (Phase 4)
  permission_handler: 12.0.3
  
  # Almacenamiento de Datos (Phase 4)
  path_provider: ^2.0.15
  
  # Feedback Háptico (Phase 4)
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/legal_data/
    - assets/dataset/